    const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;

    function App() {
      const [activeTab, setActiveTab] = useState('form'); 
      const [printRecord, setPrintRecord] = useState(null);
      const [toast, setToast] = useState(null);
      const [user, setUser] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);
      const [editingId, setEditingId] = useState(null);
      
      // ★ 雙重保險：即使離線，也會優先從瀏覽器深度記憶中抓取之前的資料
      const [records, setRecords] = useState(() => {
        const saved = localStorage.getItem('bird_island_textbook_records');
        if (saved) {
          try { return JSON.parse(saved); } catch(e) { return []; }
        }
        return [];
      });

      const [formData, setFormData] = useState(getInitialFormData());
      const [availableSubjects, setAvailableSubjects] = useState([]);

      function getInitialFormData() {
        const initialScores = Array(CRITERIA.length).fill(null).map(() => Array(PUBLISHERS.length).fill(3));
        return {
          grade: "", subject: "", reviewers: "", decision: "keep", changedPublisher: "", seriesName: "", reason: "", scores: initialScores
        };
      }

      // 每次紀錄更新時，同時備份到 localStorage (防止重整消失)
      useEffect(() => {
        localStorage.setItem('bird_island_textbook_records', JSON.stringify(records));
      }, [records]);

      // 初始化 Firebase 認證 (這一步需要 Firebase Authentication 啟用匿名登入)
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error("Firebase 登入失敗 (請確認是否啟用匿名登入)", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // 監聽 Firebase 雲端資料
      useEffect(() => {
        if (!user) return; 
        try {
          if (Object.keys(firebaseConfig).length === 0) return;
          
          const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'textbookReviews');
          const unsubscribe = onSnapshot(colRef, (snapshot) => {
            const fetchedRecords = snapshot.docs.map(doc => {
              const data = doc.data();
              let parsedScores = data.scores;
              // ★ 自動將從 Firebase 抓下來的字串解碼回陣列
              if (typeof data.scores === 'string') {
                try { parsedScores = JSON.parse(data.scores); } catch (e) {}
              }
              return { id: doc.id, ...data, scores: parsedScores };
            });
            fetchedRecords.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            setRecords(fetchedRecords);
          }, (error) => {
            console.error("雲端資料讀取失敗", error);
          });
          return () => unsubscribe();
        } catch(err) {
          console.error("Firebase未正確設定", err);
        }
      }, [user]);

      // 處理年級變更時，過濾可選科目
      useEffect(() => {
        if (formData.grade) {
          setAvailableSubjects(formData.grade === "一年級" || formData.grade === "二年級" ? SUBJECTS_LOW : SUBJECTS_HIGH);
        } else {
          setAvailableSubjects([]);
        }
      }, [formData.grade]);

      // 處理自動帶入評比教師
      useEffect(() => {
        if (formData.grade && formData.subject && !editingId) {
          setFormData(prev => ({ ...prev, reviewers: TEACHER_ALLOCATION[formData.grade]?.[formData.subject] || "", seriesName: "" }));
        }
      }, [formData.grade, formData.subject, editingId]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      };

      const copyToClipboard = () => {
        const url = window.location.href;
        const textField = document.createElement('textarea');
        textField.innerText = url;
        document.body.appendChild(textField);
        textField.select();
        document.execCommand('copy');
        textField.remove();
        showToast("系統網址已複製！");
      };

      const getPrevVersion = (grade, subject) => PREV_VERSIONS[`${grade}_${subject}`] || "無資料";

      const handleScoreChange = (cIdx, pIdx, value) => {
        const newScores = [...formData.scores];
        newScores[cIdx] = [...newScores[cIdx]];
        newScores[cIdx][pIdx] = parseInt(value, 10);
        setFormData({ ...formData, scores: newScores });
      };

      const calculateTotal = (scores, pIdx) => scores.reduce((sum, row) => sum + (row[pIdx] || 0), 0);

      const calculateRanks = (scores) => {
        const totals = PUBLISHERS.map((_, idx) => calculateTotal(scores, idx));
        const sortedTotals = [...totals].sort((a, b) => b - a);
        return totals.map(t => sortedTotals.indexOf(t) + 1);
      };

      const isEnglishSubject = formData.subject === "語文領域英語文" || formData.subject === "彈性課程望潮英創客";

      // --- 送出資料邏輯 ---
      const handleSubmit = async () => {
        if (!formData.grade || !formData.subject) return showToast("請選擇年級與科目！");
        if (formData.decision === 'change' && (!formData.changedPublisher || !formData.reason)) return showToast("若選擇改用，請選擇新版本並填寫原因！");
        if (isEnglishSubject && !formData.seriesName.trim()) return showToast("請填寫英語教材特定系列名稱（例如：Hooray）！");

        const prevVersion = getPrevVersion(formData.grade, formData.subject);
        let finalPublisher = formData.decision === 'keep' ? prevVersion : formData.changedPublisher;
        if (isEnglishSubject && formData.seriesName.trim()) finalPublisher += ` - ${formData.seriesName.trim()}`;
        
        // 自動判斷日期邏輯
        const d = new Date();
        const autoTwDate = `${d.getFullYear() - 1911}年${d.getMonth() + 1}月${d.getDate()}日`;
        const submitDate = MEETING_DATE !== "" ? MEETING_DATE : autoTwDate;

        // 將 scores 陣列與其他資料強制分離
        const { scores, ...otherFormData } = formData;

        // 建立基礎資料物件
        const baseData = {
          ...otherFormData,
          date: submitDate, // 保留填寫時的時間供列表顯示
          prevVersion,
          finalPublisher,
          timestamp: Date.now()
        };

                            <textarea className="w-full p-3 border border-gray-300 rounded-lg text-base min-h-[100px]" rows="3"
                              value={formData.reason} onChange={e => setFormData({...formData, reason: e.target.value})} placeholder="請敘述更換原因..."/>
                          </div>
                        </div>
                      )}
                    </div>
                  </label>

                  {isEnglishSubject && (
                    <div className="mt-2 p-4 bg-orange-50 border border-orange-200 rounded-xl shadow-sm relative overflow-hidden">
                      <div className="absolute left-0 top-0 bottom-0 w-1 bg-orange-400"></div>
                      <label className="block text-base font-bold text-orange-900 mb-2">請填寫英語教材特定系列版本 (必填)</label>
                      <p className="text-sm text-orange-700 mb-3">不論沿用或改用，請明確填寫系列名稱，例如：Hooray、Wonder World...</p>
                      <input type="text" className="w-full p-3 border border-orange-300 rounded-lg text-base"
                        placeholder="請輸入系列名稱..." value={formData.seriesName} onChange={e => setFormData({...formData, seriesName: e.target.value})} />
                    </div>
                  )}
                </div>
              </div>
            )}

            <div className="mb-8">
              <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end mb-4 gap-2">
                <h3 className="text-lg font-bold text-gray-800">附件：評選標準參考</h3>
                <span className="text-sm font-medium px-3 py-1 bg-gray-100 rounded-full text-gray-600 self-start sm:self-auto">
                  評分標準：5(極佳) - 4(佳) - 3(尚可) - 2(差) - 1(極差)
                </span>
              </div>

              {/* 手機版卡片 */}
              <div className="md:hidden space-y-4">
                {CRITERIA.map((criterion, cIdx) => (
                  <div key={cIdx} className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                    <div className="font-medium text-gray-800 mb-4"><span className="text-blue-600 mr-1">{cIdx + 1}.</span>{criterion}</div>
                    <div className="grid grid-cols-3 gap-3">
                      {PUBLISHERS.map((pub, pIdx) => (
                        <div key={pub} className="flex flex-col">
                          <label className="text-xs text-center text-gray-500 mb-1.5 font-medium">{pub}</label>
                          <select className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg text-center text-lg font-bold text-blue-700"
                            value={formData.scores[cIdx][pIdx]} onChange={(e) => handleScoreChange(cIdx, pIdx, e.target.value)}>
                            {[5,4,3,2,1].map(num => <option key={num} value={num}>{num} 分</option>)}
                          </select>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl shadow-sm mt-6">
                  <h4 className="font-bold text-center text-blue-800 mb-4 border-b border-blue-200 pb-2">評分總結</h4>
                  <div className="grid grid-cols-3 gap-3">
                    {PUBLISHERS.map((pub, pIdx) => (
                      <div key={pub} className="text-center">
                        <div className="text-sm font-medium text-gray-600 mb-1">{pub}</div>
                        <div className="text-2xl font-black text-blue-600">{totals[pIdx]}</div>
                        <div className="text-sm text-gray-500 mt-1">第 {ranks[pIdx]} 名</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* 桌機版表格 */}
              <div className="hidden md:block overflow-x-auto rounded-xl border border-gray-200">
                <table className="w-full min-w-[800px] border-collapse text-sm">
                  <thead>
                    <tr className="bg-gray-100">
                      <th className="border-b p-3 text-left w-1/4 font-semibold text-gray-700">評比內容</th>
                      {PUBLISHERS.map(pub => <th key={pub} className="border-b border-l p-3 text-center font-semibold text-gray-700">{pub}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {CRITERIA.map((criterion, cIdx) => (
                      <tr key={cIdx} className="hover:bg-gray-50">
                        <td className="border-b p-3 pr-4 text-gray-800">{cIdx + 1}. {criterion}</td>
                        {PUBLISHERS.map((pub, pIdx) => (
                          <td key={pub} className="border-b border-l p-2 text-center align-middle">
                            <select className="p-2 border border-gray-300 rounded w-20 text-center text-base"
                              value={formData.scores[cIdx][pIdx]} onChange={(e) => handleScoreChange(cIdx, pIdx, e.target.value)}>
                              {[5,4,3,2,1].map(num => <option key={num} value={num}>{num}</option>)}
                            </select>
                          </td>
                        ))}
                      </tr>
                    ))}
                    <tr className="bg-blue-50">
                      <td className="border-b p-3 text-right font-bold text-gray-700">總分</td>
                      {totals.map((total, i) => <td key={i} className="border-b border-l p-3 text-center text-blue-700 text-xl font-bold">{total}</td>)}
                    </tr>
                    <tr className="bg-blue-50">
                      <td className="p-3 text-right font-bold text-gray-700">名次（順位）</td>
                      {ranks.map((rank, i) => <td key={i} className="border-l p-3 text-center font-bold text-gray-800">{rank}</td>)}
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-4 pt-4 border-t border-gray-100">
              <button onClick={() => { 
                if(window.confirm("確定要取消編輯並清除資料嗎？")) {
                  setFormData(getInitialFormData());
                  setEditingId(null);
                }
              }}
                className="w-full sm:w-auto px-6 py-3 sm:py-2 bg-gray-100 border border-gray-300 rounded-xl sm:rounded-lg text-gray-700 font-medium">
                {editingId ? "取消編輯" : "清除重填"}
              </button>
              <button onClick={handleSubmit} disabled={isSaving}
                className={`w-full sm:w-auto px-8 py-3 sm:py-2 text-white rounded-xl sm:rounded-lg flex justify-center items-center gap-2 shadow-md font-medium ${isSaving ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                <IconSave /> {isSaving ? '儲存中...' : (editingId ? '更新紀錄表' : '儲存紀錄表 (自動同步)')}
              </button>
            </div>
          </div>
        );
      };

      const renderList = () => {
        return (
          <div className="max-w-6xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-sm border border-gray-200">
            <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-6 flex items-center justify-between">
              <div className="flex items-center gap-2"><span className="text-blue-600"><IconList /></span> 已儲存的紀錄</div>
              {user ? (
                <span className="text-sm font-normal text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-200">● 雲端同步中</span>
              ) : (
                <span className="text-sm font-normal text-orange-600 bg-orange-50 px-3 py-1 rounded-full border border-orange-200">● 僅保存在本機</span>
              )}
            </h2>

            {records.length === 0 ? (
              <div className="text-center py-16 text-gray-500 bg-gray-50 rounded-xl border border-dashed border-gray-300 mx-2">
                <div className="flex justify-center text-gray-400 mb-4"><IconFileText /></div>
                <p className="text-lg">目前尚無紀錄，請點擊上方「新增」開始選用。</p>
              </div>
            ) : (
              <div className="overflow-x-auto rounded-xl border border-gray-200">
                <table className="w-full text-left border-collapse min-w-[900px]">
                  <thead>
                    <tr className="bg-gray-100 text-gray-700">
                      <th className="p-4 border-b font-semibold">填寫日期</th>
                      <th className="p-4 border-b font-semibold">年級 / 科目</th>
                      <th className="p-4 border-b font-semibold">評比教師</th>
                      <th className="p-4 border-b font-semibold">選用決議</th>
                      <th className="p-4 border-b text-center font-semibold">操作 / 匯出</th>
                    </tr>
                  </thead>
                  <tbody>
                    {records.map((r) => (
                      <tr key={r.id} className="hover:bg-gray-50 transition-colors">
                        <td className="p-4 border-b text-gray-600">{r.date}</td>
                        <td className="p-4 border-b font-bold text-gray-800">{r.grade} {r.subject}</td>
                        <td className="p-4 border-b text-gray-600">{r.reviewers}</td>
                        <td className="p-4 border-b">
                          {r.decision === 'keep' ? (
                            <span className="text-green-700 font-medium bg-green-50 px-3 py-1.5 rounded-lg text-sm border border-green-200">沿用 {r.finalPublisher}</span>
                          ) : (
                            <span className="text-orange-700 font-medium bg-orange-50 px-3 py-1.5 rounded-lg text-sm border border-orange-200">改用 {r.finalPublisher}</span>
                          )}
                        </td>
                        <td className="p-4 border-b text-center">
                          <div className="flex justify-center items-center gap-2">
                            <button onClick={() => exportToPDF(r)} className="inline-flex items-center gap-1.5 px-3 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-medium shadow-sm" title="下載為 PDF">
                              <IconPdf /> PDF
                            </button>
                            <button onClick={() => exportToWord(r)} className="inline-flex items-center gap-1.5 px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium shadow-sm" title="下載為 Word">
                              <IconDownload /> Word
                            </button>
                            <button onClick={() => handlePrint(r)} className="inline-flex items-center gap-1.5 px-3 py-2 bg-gray-700 text-white rounded-lg hover:bg-gray-600 text-sm font-medium shadow-sm" title="預覽或列印">
                              <IconPrinter /> 預覽
                            </button>
                            <button onClick={() => handleEdit(r)} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors border border-blue-200" title="修改此紀錄">
                              <IconEdit />
                            </button>
                            <button onClick={() => handleDelete(r.id)} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition-colors border border-red-200" title="刪除此紀錄">
                              <IconTrash />
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      };

      const renderPrint = () => {
        if (!printRecord) return null;
        const r = printRecord;
        const totals = PUBLISHERS.map((_, i) => calculateTotal(r.scores, i));
        const ranks = calculateRanks(r.scores);

        const keepText = r.decision === 'keep' ? (r.seriesName ? `${r.prevVersion}-${r.seriesName}` : r.prevVersion) : '';
        const changeText = r.decision === 'change' ? (r.seriesName ? `${r.changedPublisher}-${r.seriesName}` : r.changedPublisher) : '';

        return (
          <div className="bg-white p-4 sm:p-8 max-w-[800px] mx-auto text-black print-container font-serif">
            <style dangerouslySetInnerHTML={{__html: `
              @media print {
                body * { visibility: hidden; }
                .print-container, .print-container * { visibility: visible; }
                .print-container { position: absolute; left: 0; top: 0; width: 100%; }
                @page { margin: 1.5cm; }
              }
              .doc-title { font-size: 1.25rem; font-weight: bold; text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.05em;}
              .doc-info { margin-bottom: 1rem; line-height: 1.8; }
              .doc-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem;}
              .doc-table th, .doc-table td { border: 1px solid black; padding: 6px; }
              .checkbox-box { display: inline-block; width: 14px; height: 14px; border: 1px solid black; margin-right: 4px; vertical-align: middle; position: relative; }
              .checkbox-checked::after { content: '✓'; position: absolute; top: -3px; left: 1px; font-size: 14px; font-weight: bold;}
              .underline-gap { display: inline-block; border-bottom: 1px solid black; min-width: 100px; padding: 0 10px; text-align: center; }
              .underline-gap-long { display: inline-block; border-bottom: 1px solid black; width: 300px; padding: 0 10px; }
            `}} />

            <div className="doc-title">{SCHOOL_NAME}{ACADEMIC_YEAR}學年度{r.grade}{r.subject}教科書審查紀錄表</div>
            <div className="doc-info">
              <div>時間： ${MEETING_DATE || r.date}</div>
              <div>召集人： ${CONVENER}</div>
              <div>評比教師： ${r.reviewers}</div>
              <div>評比說明：</div>
              <div className="pl-2 mt-1 mb-3 space-y-1">
                <div>1. 請參考附件之評選標準,將各版本課本、習作、教學指引一併評比，以求客觀公正。</div>
                <div>2. 請與同年段該領域授課教師共同討論選用版本,並相互協調意見後再決定版本。</div>
                <div>3. 若沿用前學年度版本請勾選填寫「沿用______版本」;若更換版本請勾選填寫「改用________版本」,年度領域小組成員討論並寫下更換原因,並請年段領域選用代表人於會議上報告。</div>
              </div>
              <div>評比意見：</div>
              <div className="pl-4 mt-2">
                <div><span className={`checkbox-box ${r.decision === 'keep' ? 'checkbox-checked' : ''}`}></span>教科書沿用前學年度 <span className="underline-gap">${keepText}</span> 版本。</div>
                <div className="mt-2"><span className={`checkbox-box ${r.decision === 'change' ? 'checkbox-checked' : ''}`}></span>教科書改用 <span className="underline-gap">${changeText}</span> 版本，</div>
                <div className="ml-5 mt-1">更換原因為： <span className="underline-gap-long">${r.reason}</span></div>
              </div>
            </div>

            <div className="mt-8">
              <div className="font-bold mb-2">附件 評選標準參考</div>
              <table className="doc-table">
                <thead>
                  <tr><th rowSpan={2} style={{width: '40%'}}>評比內容</th><th colSpan={3}>版本</th></tr>
                  <tr>{PUBLISHERS.map(pub => <th key={pub}>{pub}</th>)}</tr>
                  <tr style={{fontSize: '0.8rem'}}><th></th>{PUBLISHERS.map(pub => <th key={`score-${pub}`} style={{fontWeight: 'normal'}}>極佳 5 佳 4 尚可 3 差 2 極差 1</th>)}</tr>
                </thead>
                <tbody>
                  {CRITERIA.map((criterion, cIdx) => (
                    <tr key={cIdx}><td>{criterion}</td>{PUBLISHERS.map((pub, pIdx) => <td key={pub} style={{textAlign: 'center'}}>{r.scores[cIdx][pIdx]}</td>)}</tr>
                  ))}
                  <tr style={{fontWeight: 'bold'}}><td style={{textAlign: 'right'}}>總分</td>{totals.map((t, i) => <td key={`total-${i}`} style={{textAlign: 'center'}}>{t}</td>)}</tr>
                  <tr style={{fontWeight: 'bold'}}><td style={{textAlign: 'right'}}>名次（順位）</td>{ranks.map((rank, i) => <td key={`rank-${i}`} style={{textAlign: 'center'}}>{rank}</td>)}</tr>
                </tbody>
              </table>
            </div>

            <div className="mt-8 flex flex-wrap justify-center gap-4 print:hidden">
              <button onClick={() => setActiveTab('list')} className="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 font-medium">返回列表</button>
              <button onClick={() => exportToPDF(r)} className="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 flex items-center gap-2 font-medium"><IconPdf /> 下載 PDF</button>
              <button onClick={() => exportToWord(r)} className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2 font-medium"><IconDownload /> 下載 Word</button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 sm:bg-gray-100 font-sans text-gray-800 selection:bg-blue-200">
          {toast && (
            <div className="fixed top-4 right-4 left-4 sm:left-auto z-50 bg-green-600 text-white px-6 py-4 rounded-xl shadow-lg flex items-center gap-3 animate-bounce">
              <span className="text-2xl">✅</span>
              <span className="font-medium text-lg">{toast}</span>
            </div>
          )}

          {/* 分享視窗 (Modal) */}
          {showShareModal && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-sm w-full relative shadow-2xl">
                <button onClick={() => setShowShareModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors">
                  <span>❌</span>
                </button>
                <h3 className="text-xl font-bold text-gray-800 mb-4 text-center">分享系統給校內教師</h3>
                <p className="text-sm text-gray-600 text-center mb-6">請老師掃描下方 QR Code，或點擊右側按鈕複製網址傳至群組：</p>
                <div className="flex justify-center mb-6">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`} alt="系統 QR Code" className="w-48 h-48 border-4 border-white shadow-sm rounded-xl"/>
                </div>
                <div className="flex gap-2">
                  <input type="text" readOnly value={window.location.href} className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-sm text-gray-500 overflow-hidden" />
                  <button onClick={copyToClipboard} className="p-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex-shrink-0 transition-colors flex items-center gap-1" title="複製網址">
                    <span>📋</span>
                  </button>
                </div>
              </div>
            </div>
          )}

          {activeTab !== 'print' && (
            <nav className="bg-white shadow-sm mb-4 sm:mb-8 print:hidden sticky top-0 z-40">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl flex-shrink-0">{ACADEMIC_YEAR}</div>
                  <div>
                    <h1 className="font-bold text-lg sm:text-xl text-gray-800 leading-tight">{SCHOOL_NAME} 教科書選用系統</h1>
                    <p className="text-xs text-gray-500">Academic Year Textbook Selection</p>
                  </div>
                </div>
                
                <div className="flex gap-1.5 sm:gap-2 overflow-x-auto pb-1 sm:pb-0 items-center" style={{scrollbarWidth: 'none'}}>
                  <button onClick={() => setShowShareModal(true)} className="flex-shrink-0 px-3 sm:px-4 py-2 rounded-lg font-bold flex items-center gap-1.5 sm:gap-2 transition-colors text-sm sm:text-base bg-orange-100 text-orange-700 hover:bg-orange-200 mr-2">
                    <IconShare /> 分享系統
                  </button>
                  <button onClick={() => setActiveTab('table')} className={`flex-shrink-0 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-1.5 sm:gap-2 transition-colors text-sm sm:text-base ${activeTab === 'table' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconUsers /> 分配表</button>
                  <button onClick={() => {
                    setFormData(getInitialFormData());
                    setEditingId(null);
                    setActiveTab('form');
                  }} className={`flex-shrink-0 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-1.5 sm:gap-2 transition-colors text-sm sm:text-base ${activeTab === 'form' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconPlus /> 新增</button>
                  <button onClick={() => setActiveTab('list')} className={`flex-shrink-0 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-1.5 sm:gap-2 transition-colors text-sm sm:text-base ${activeTab === 'list' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconList /> 紀錄 ({records.length})</button>
                </div>
              </div>
            </nav>
          )}

          <main className="pb-16 sm:pb-12 px-2 sm:px-0">
            {activeTab === 'table' && renderAllocationTable()}
            {activeTab === 'form' && renderForm()}
            {activeTab === 'list' && renderList()}
            {activeTab === 'print' && renderPrint()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
